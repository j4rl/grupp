<!DOCTYPE html>
<html lang="sv" data-theme="auto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gruppindelning</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Syne+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #8fbc2a;
    --accent2: #7b61ff;
    --danger: #ff5a5a;
    --radius: 12px;
    /* dark defaults */
    --bg: #0e0e12;
    --surface: #16161d;
    --surface2: #1e1e28;
    --border: #2a2a38;
    --text: #f0f0f5;
    --muted: #6b6b80;
  }

  /* Light theme */
  [data-theme="light"] {
    --bg: #f4f4f0;
    --surface: #ffffff;
    --surface2: #ebebeb;
    --border: #d4d4cc;
    --text: #18181c;
    --muted: #888880;
    --accent: #5a9e00;
    --accent2: #5a3fd6;
  }

  /* Auto: follow OS */
  @media (prefers-color-scheme: light) {
    [data-theme="auto"] {
      --bg: #f4f4f0;
      --surface: #ffffff;
      --surface2: #ebebeb;
      --border: #d4d4cc;
      --text: #18181c;
      --muted: #888880;
      --accent: #5a9e00;
      --accent2: #5a3fd6;
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 0.25s, color 0.25s;
  }

  /* Noise overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  header {
    display: flex;
    align-items: flex-end;
    gap: 16px;
    margin-bottom: 48px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 24px;
  }

  .logo-mark {
    width: 48px;
    height: 48px;
    background: var(--accent);
    border-radius: 10px;
    display: grid;
    place-items: center;
    flex-shrink: 0;
    color: var(--bg);
  }

  .logo-mark svg { width: 28px; height: 28px; }

  h1 {
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    font-size: 0.85rem;
    color: var(--muted);
    margin-top: 4px;
    font-family: 'Syne Mono', monospace;
  }

  .layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }

  @media (max-width: 760px) {
    .layout { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
  }

  .panel-title {
    font-size: 0.7rem;
    font-family: 'Syne Mono', monospace;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Name input area */
  .name-input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }

  input[type="text"] {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus {
    border-color: var(--accent);
  }

  input[type="text"]::placeholder { color: var(--muted); }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--accent);
    color: #0e0e12;
    border: none;
    border-radius: 8px;
    padding: 10px 16px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
    white-space: nowrap;
  }

  .btn:hover { opacity: 0.88; }
  .btn:active { transform: scale(0.97); }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .btn-ghost:hover { color: var(--text); border-color: var(--muted); opacity: 1; }

  .btn-danger {
    background: transparent;
    color: var(--danger);
    border: 1px solid var(--danger);
  }

  .btn-danger:hover { background: var(--danger); color: white; opacity: 1; }

  .btn-accent2 {
    background: var(--accent2);
    color: white;
  }

  /* Import area */
  .import-zone {
    border: 2px dashed var(--border);
    border-radius: 8px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    margin-bottom: 12px;
    position: relative;
  }

  .import-zone:hover, .import-zone.drag-over {
    border-color: var(--accent);
    background: rgba(200,240,60,0.04);
  }

  .import-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
  }

  .import-icon { font-size: 1.6rem; margin-bottom: 6px; }
  .import-text { font-size: 0.8rem; color: var(--muted); }
  .import-text strong { color: var(--text); }

  /* Name list */
  .name-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    max-height: 220px;
    overflow-y: auto;
    margin-top: 4px;
  }

  .name-list::-webkit-scrollbar { width: 4px; }
  .name-list::-webkit-scrollbar-track { background: transparent; }
  .name-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .name-tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 10px 4px 12px;
    font-size: 0.82rem;
    animation: tagIn 0.2s ease;
  }

  @keyframes tagIn {
    from { opacity: 0; transform: scale(0.85); }
    to { opacity: 1; transform: scale(1); }
  }

  .name-tag button {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.9rem;
    line-height: 1;
    padding: 0;
    transition: color 0.15s;
  }

  .name-tag button:hover { color: var(--danger); }

  .name-count {
    font-family: 'Syne Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 10px;
  }

  .name-count span { color: var(--accent); font-weight: 600; }

  /* Settings */
  .settings-row {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-bottom: 20px;
  }

  .setting-item label {
    display: block;
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 6px;
    font-family: 'Syne Mono', monospace;
  }

  .mode-toggle {
    display: flex;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .mode-toggle button {
    flex: 1;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    padding: 10px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }

  .mode-toggle button.active {
    background: var(--accent);
    color: #0e0e12;
  }

  .number-input-wrap {
    display: flex;
    align-items: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .number-input-wrap button {
    background: none;
    border: none;
    color: var(--text);
    font-size: 1.2rem;
    padding: 8px 16px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .number-input-wrap button:hover { background: var(--border); }

  .number-input-wrap span {
    flex: 1;
    text-align: center;
    font-family: 'Syne Mono', monospace;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--accent);
  }

  .predict-text {
    font-size: 0.75rem;
    color: var(--muted);
    font-family: 'Syne Mono', monospace;
    margin-top: 6px;
    min-height: 1.2em;
  }

  .predict-text strong { color: var(--text); }

  /* Actions */
  .action-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .btn-big {
    padding: 14px 28px;
    font-size: 1rem;
    border-radius: 10px;
    flex: 1;
  }

  /* Results */
  .results-area {
    grid-column: 1 / -1;
    display: none;
  }

  .results-area.visible { display: block; }

  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .results-title {
    font-size: 1.1rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .results-badge {
    background: var(--accent);
    color: #0e0e12;
    font-size: 0.7rem;
    font-family: 'Syne Mono', monospace;
    padding: 3px 8px;
    border-radius: 20px;
    font-weight: 700;
  }

  .groups-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 16px;
  }

  .group-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    animation: cardIn 0.3s ease both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .group-header {
    padding: 10px 14px;
    font-size: 0.7rem;
    font-family: 'Syne Mono', monospace;
    font-weight: 600;
    letter-spacing: 0.08em;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .group-num {
    color: var(--accent);
  }

  .group-size {
    color: var(--muted);
    font-size: 0.65rem;
  }

  .group-members {
    padding: 10px 14px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .member {
    font-size: 0.88rem;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 3px 0;
    border-bottom: 1px solid var(--border);
  }

  .member:last-child { border-bottom: none; }

  .member-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent2);
    flex-shrink: 0;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Syne Mono', monospace;
    font-size: 0.82rem;
    padding: 12px 20px;
    border-radius: 40px;
    z-index: 100;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Print / PDF styles */
  @media print {
    @page { margin: 20mm 18mm; size: A4; }
    body { background: white !important; color: #111 !important; }
    body::before { display: none; }
    .app { padding: 0; max-width: 100%; }
    header, .layout > .panel:not(.results-area) { display: none !important; }
    .results-area {
      display: block !important;
      border: none !important;
      background: white !important;
      padding: 0 !important;
      grid-column: auto !important;
    }
    .results-header { margin-bottom: 14mm; }
    .results-title { font-size: 18pt; color: #111 !important; }
    .results-badge { background: #111 !important; color: white !important; font-size: 8pt; }
    .copy-row { display: none !important; }
    .groups-grid { grid-template-columns: repeat(3, 1fr); gap: 8mm; }
    .group-card {
      background: white !important;
      border: 1.5pt solid #ccc !important;
      border-radius: 6pt;
      break-inside: avoid;
      page-break-inside: avoid;
    }
    .group-header {
      background: #f5f5f5 !important;
      padding: 6pt 10pt !important;
      border-bottom: 1pt solid #ddd !important;
    }
    .group-num { font-size: 8pt !important; }
    .group-size { font-size: 7pt !important; color: #666 !important; }
    .group-members { padding: 6pt 10pt !important; }
    .member { font-size: 9pt !important; color: #111 !important; border-bottom: 0.5pt solid #eee !important; padding: 2pt 0 !important; }
    .member-dot { background: #555 !important; }
    .print-footer { display: block !important; }
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
  .print-footer {
    display: none;
    text-align: center;
    margin-top: 14mm;
    font-size: 7pt;
    color: #aaa;
    font-family: monospace;
  }

  .theme-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 0.78rem;
    padding: 5px 10px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    white-space: nowrap;
  }
  .theme-btn:hover { border-color: var(--muted); }
  .theme-btn.active { border-color: var(--accent); background: rgba(200,240,60,0.1); color: var(--accent); }

  /* Utility */
  .flex-row { display: flex; gap: 8px; align-items: center; }
  .mt8 { margin-top: 8px; }
  .empty-state { color: var(--muted); font-size: 0.82rem; padding: 20px 0; text-align: center; font-family: 'Syne Mono', monospace; }

  .copy-row { display: flex; gap: 8px; flex-wrap: wrap; }

  .shuffle-btn {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .shuffle-btn svg {
    transition: transform 0.4s;
  }
  .shuffle-btn:hover svg { transform: rotate(180deg); }

  /* Theme toggle */
  .theme-toggle {
    display: flex;
    align-items: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 30px;
    padding: 3px;
    gap: 2px;
    margin-left: auto;
  }

  .theme-toggle button {
    background: none;
    border: none;
    border-radius: 24px;
    padding: 5px 9px;
    cursor: pointer;
    font-size: 0.9rem;
    line-height: 1;
    color: var(--muted);
    transition: background 0.18s, color 0.18s;
  }

  .theme-toggle button.active {
    background: var(--surface);
    color: var(--text);
    box-shadow: 0 1px 4px rgba(0,0,0,0.18);
  }

  [data-theme="light"] .theme-toggle button.active {
    box-shadow: 0 1px 4px rgba(0,0,0,0.10);
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo-mark">
      <svg viewBox="0 0 28 28" fill="none">
        <rect x="2" y="2" width="10" height="10" rx="2" fill="currentColor"/>
        <rect x="16" y="2" width="10" height="10" rx="2" fill="currentColor"/>
        <rect x="2" y="16" width="10" height="10" rx="2" fill="currentColor"/>
        <rect x="16" y="16" width="10" height="10" rx="2" fill="currentColor" opacity="0.4"/>
      </svg>
    </div>
    <div>
      <h1>Grupp<span>indelning</span></h1>
      <div class="subtitle">// slumpmässig gruppgenerator</div>
    </div>
    <div class="theme-toggle" id="themeToggle">
      <button onclick="setTheme('light')" title="Ljust läge">☀️</button>
      <button onclick="setTheme('auto')"  title="Automatiskt">⚙️</button>
      <button onclick="setTheme('dark')"  title="Mörkt läge">🌙</button>
    </div>
  </header>

  <div class="layout">
    <!-- Panel 1: Names -->
    <div class="panel">
      <div class="panel-title">01 — Deltagare</div>

      <!-- Import -->
      <div class="import-zone" id="dropZone">
        <input type="file" id="fileInput" accept=".csv,.xlsx,.xls,.json,.txt" multiple>
        <div class="import-icon">📂</div>
        <div class="import-text">
          <strong>Dra och släpp filer hit</strong><br>
          CSV · Excel · JSON · TXT
        </div>
      </div>

      <!-- Manual add -->
      <div class="name-input-row">
        <input type="text" id="nameInput" placeholder="Ange ett namn..." autocomplete="off">
        <button class="btn" onclick="addName()">+ Lägg till</button>
      </div>

      <!-- Bulk paste -->
      <div class="flex-row mt8">
        <button class="btn btn-ghost" onclick="togglePaste()" style="font-size:0.78rem;">📋 Klistra in lista</button>
        <button class="btn btn-ghost" onclick="clearAll()" style="font-size:0.78rem; color: var(--danger); border-color: var(--danger);">🗑 Rensa allt</button>
      </div>

      <div id="pasteArea" style="display:none; margin-top:10px;">
        <textarea id="pasteInput" placeholder="En rad per namn, eller kommaseparerat..."
          style="width:100%; height:90px; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:10px; color:var(--text); font-family:'Syne Mono',monospace; font-size:0.82rem; resize:vertical; outline:none;"></textarea>
        <div class="flex-row mt8">
          <button class="btn" style="font-size:0.8rem;" onclick="importPaste()">Importera</button>
          <button class="btn btn-ghost" style="font-size:0.8rem;" onclick="togglePaste()">Avbryt</button>
        </div>
      </div>

      <!-- List -->
      <div id="nameList" class="name-list" style="margin-top:14px;">
        <div class="empty-state" id="emptyState">Inga namn tillagda ännu</div>
      </div>
      <div class="name-count" id="nameCount"></div>
    </div>

    <!-- Panel 2: Settings -->
    <div class="panel">
      <div class="panel-title">02 — Inställningar</div>

      <div class="settings-row">
        <div class="setting-item">
          <label>FÖRDELNINGSMETOD</label>
          <div class="mode-toggle">
            <button class="active" id="modeAntal" onclick="setMode('antal')">Antal grupper</button>
            <button id="modeStorlek" onclick="setMode('storlek')">Storlek per grupp</button>
          </div>
        </div>

        <div class="setting-item">
          <label id="numLabel">ANTAL GRUPPER</label>
          <div class="number-input-wrap">
            <button onclick="changeNum(-1)">−</button>
            <span id="numDisplay">4</span>
            <button onclick="changeNum(1)">+</button>
          </div>
          <div class="predict-text" id="predictText"></div>
        </div>

        <div class="setting-item">
          <label>BLANDNINGSALTERNATIV</label>
          <div style="display:flex; flex-direction:column; gap:6px;">
            <label style="display:flex; align-items:center; gap:8px; color:var(--text); cursor:pointer; font-family:'Syne',sans-serif; font-size:0.85rem;">
              <input type="checkbox" id="keepRemainder" checked style="accent-color: var(--accent);">
              Fördela "överblivna" jämnt
            </label>
          </div>
        </div>

        <div class="setting-item">
          <label>GRUPPNAMN</label>
          <div class="mode-toggle">
            <button class="active" id="nameStyleNum" onclick="setNameStyle('nummer')">Nummer</button>
            <button id="nameStyleTheme" onclick="setNameStyle('tema')">Slumpat tema</button>
            <button id="nameStyleCustom" onclick="setNameStyle('eget')">Eget prefix</button>
          </div>
          <div id="themePickerWrap" style="display:none; margin-top:10px;">
            <label style="font-size:0.72rem; color:var(--muted); font-family:'Syne Mono',monospace; display:block; margin-bottom:6px;">VÄLJ TEMA</label>
            <div style="display:flex; flex-wrap:wrap; gap:6px;" id="themePicker"></div>
          </div>
          <div id="customPrefixWrap" style="display:none; margin-top:10px;">
            <input type="text" id="customPrefix" placeholder="ex: Lag, Team, Klass..." style="width:100%;">
          </div>
        </div>
      </div>

      <div class="action-row">
        <button class="btn btn-big shuffle-btn" onclick="generateGroups()">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M1 4h9.5M10.5 4l-2-2m2 2-2 2M15 12H5.5m0 0 2 2m-2-2 2-2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          Generera grupper
        </button>
      </div>
    </div>

    <!-- Results -->
    <div class="results-area panel" id="resultsArea">
      <div class="results-header">
        <div class="results-title">
          Resultat
          <span class="results-badge" id="resultsBadge">0 grupper</span>
        </div>
        <div class="copy-row">
          <button class="btn btn-ghost" style="font-size:0.78rem;" onclick="copyResult()">📋 Kopiera</button>
          <button class="btn btn-ghost" style="font-size:0.78rem;" onclick="downloadResult()">💾 Ladda ner</button>
          <button class="btn btn-ghost" style="font-size:0.78rem;" onclick="downloadPDF()">📄 PDF</button>
          <button class="btn shuffle-btn" style="font-size:0.78rem;" onclick="generateGroups()">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
              <path d="M1 4h9.5M10.5 4l-2-2m2 2-2 2M15 12H5.5m0 0 2 2m-2-2 2-2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
            Blanda om
          </button>
        </div>
      </div>
      <div class="groups-grid" id="groupsGrid"></div>
      <div class="print-footer">Genererad av Gruppindelning &mdash; <span id="printDate"></span></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// --- Theme ---
function setTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('theme', t);
  document.querySelectorAll('#themeToggle button').forEach((btn, i) => {
    btn.classList.toggle('active', ['light','auto','dark'][i] === t);
  });
}
(function initTheme() {
  const saved = localStorage.getItem('theme') || 'auto';
  setTheme(saved);
})();

// --- State ---
let names = [];
let mode = 'antal'; // 'antal' | 'storlek'
let numValue = 4;
let nameStyle = 'nummer'; // 'nummer' | 'tema' | 'eget'
let activeTheme = 'djur';

const THEMES = {
  'djur':     { label: '🐾 Djur',      words: ['Räven','Björnen','Vargen','Örnen','Tigern','Lejonet','Delfinen','Falken','Lodjuret','Älgen','Hajen','Korpen','Puman','Gazelln','Bävern','Igelkotten','Flodhästen','Geparden','Zebran','Pingvinen'] },
  'rymden':   { label: '🚀 Rymden',    words: ['Orion','Nebula','Cassini','Hubble','Apollo','Sirius','Vega','Polaris','Andromeda','Titan','Aurora','Cosmos','Lyra','Cygnus','Altair','Rigel','Antares','Deneb','Proxima','Quasar'] },
  'natur':    { label: '🌿 Natur',     words: ['Granen','Eken','Björken','Tallens','Aspen','Linden','Almens','Rönnens','Hasselns','Bokens','Viden','Sälgens','Enens','Häggns','Forsens','Sjöns','Flodens','Bergets','Dalens','Slättens'] },
  'mat':      { label: '🍕 Mat',       words: ['Pizzan','Tacos','Sushis','Burgarn','Pastas','Waffle','Muffins','Tårtan','Noodles','Curryn','Falafel','Paninis','Ramen','Gazpacho','Risotton','Crêpen','Wonton','Burritos','Tzatziki','Fondue'] },
  'färger':   { label: '🎨 Färger',    words: ['Kobolt','Scarlet','Safran','Smaragd','Karmin','Indigo','Cerise','Amber','Lavendel','Korall','Turkos','Purpur','Citrin','Azur','Magenta','Ocker','Sepia','Jade','Perla','Karminröd'] },
  'sport':    { label: '⚽ Sport',     words: ['Sprinters','Titans','Eagles','Phoenix','Vipers','Wolves','Sharks','Falcons','Storm','Blazers','Knights','Raiders','Comets','Thunder','Legends','Rebels','Warriors','Rangers','Hunters','Strikers'] },
  'musik':    { label: '🎵 Musik',     words: ['Allegro','Fortissimo','Staccato','Vibrato','Crescendo','Adagio','Pizzicato','Fermata','Serenad','Overtyren','Balladen','Sonatens','Rapsodi','Preludium','Nocturne','Etyd','Kadensen','Fuga','Arion','Legato'] },
  'mytologi': { label: '⚡ Mytologi',  words: ['Zevs','Ares','Hermes','Poseidon','Athena','Apollo','Artemis','Hestia','Hefaist','Demeter','Dionys','Hades','Nyx','Iris','Nemesis','Eros','Titan','Kronos','Helios','Selene'] },
};

function setNameStyle(style) {
  nameStyle = style;
  const idMap = { 'nummer': 'nameStyleNum', 'tema': 'nameStyleTheme', 'eget': 'nameStyleCustom' };
  Object.values(idMap).forEach(id => document.getElementById(id).classList.remove('active'));
  document.getElementById(idMap[style]).classList.add('active');
  document.getElementById('themePickerWrap').style.display = style === 'tema' ? 'block' : 'none';
  document.getElementById('customPrefixWrap').style.display = style === 'eget' ? 'block' : 'none';
}

function buildThemePicker() {
  const picker = document.getElementById('themePicker');
  Object.entries(THEMES).forEach(([key, val]) => {
    const btn = document.createElement('button');
    btn.className = 'theme-btn' + (key === activeTheme ? ' active' : '');
    btn.textContent = val.label;
    btn.onclick = () => {
      activeTheme = key;
      picker.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    };
    picker.appendChild(btn);
  });
}

function getGroupName(i, total) {
  if (nameStyle === 'nummer') return `GRUPP ${i + 1}`;
  if (nameStyle === 'eget') {
    const prefix = document.getElementById('customPrefix').value.trim() || 'Grupp';
    return `${prefix} ${i + 1}`;
  }
  if (nameStyle === 'tema') {
    const pool = THEMES[activeTheme].words;
    // Pre-shuffle pool for this generation, stored in window._themePool
    if (!window._themePool) window._themePool = [...pool].sort(() => Math.random() - 0.5);
    return window._themePool[i % pool.length];
  }
  return `GRUPP ${i + 1}`;
}

// --- Name Management ---
function addName(n) {
  const input = document.getElementById('nameInput');
  const name = (n || input.value).trim();
  if (!name) return;
  if (names.includes(name)) { showToast(`"${name}" finns redan`); input.value = ''; return; }
  names.push(name);
  input.value = '';
  renderNames();
  updatePredict();
}

function removeName(i) {
  names.splice(i, 1);
  renderNames();
  updatePredict();
}

function clearAll() {
  if (!names.length) return;
  names = [];
  renderNames();
  updatePredict();
  document.getElementById('resultsArea').classList.remove('visible');
}

function renderNames() {
  const list = document.getElementById('nameList');
  const empty = document.getElementById('emptyState');
  const count = document.getElementById('nameCount');
  list.innerHTML = '';
  if (!names.length) {
    list.appendChild(empty);
    count.innerHTML = '';
    return;
  }
  names.forEach((n, i) => {
    const tag = document.createElement('div');
    tag.className = 'name-tag';
    tag.innerHTML = `${n}<button onclick="removeName(${i})" title="Ta bort">×</button>`;
    list.appendChild(tag);
  });
  count.innerHTML = `Totalt: <span>${names.length}</span> deltagare`;
}

// --- Import ---
document.getElementById('nameInput').addEventListener('keydown', e => { if (e.key === 'Enter') addName(); });

document.getElementById('fileInput').addEventListener('change', e => {
  Array.from(e.target.files).forEach(handleFile);
  e.target.value = '';
});

const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  Array.from(e.dataTransfer.files).forEach(handleFile);
});

function handleFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  const reader = new FileReader();

  if (ext === 'json') {
    reader.onload = e => {
      try {
        const data = JSON.parse(e.target.result);
        const arr = Array.isArray(data) ? data : Object.values(data).flat();
        arr.forEach(v => { const s = String(v).trim(); if (s) addUnique(s); });
        showToast(`✓ ${file.name} importerad`);
        updatePredict();
      } catch { showToast('Ogiltig JSON-fil'); }
    };
    reader.readAsText(file);
  } else if (ext === 'txt') {
    reader.onload = e => {
      e.target.result.split(/[\n,]+/).forEach(n => { const s = n.trim(); if (s) addUnique(s); });
      showToast(`✓ ${file.name} importerad`);
      renderNames(); updatePredict();
    };
    reader.readAsText(file);
  } else if (ext === 'csv') {
    reader.onload = e => {
      const lines = e.target.result.split('\n');
      lines.forEach(line => {
        line.split(',').forEach(cell => { const s = cell.replace(/"/g, '').trim(); if (s) addUnique(s); });
      });
      showToast(`✓ ${file.name} importerad`);
      renderNames(); updatePredict();
    };
    reader.readAsText(file);
  } else if (ext === 'xlsx' || ext === 'xls') {
    reader.onload = e => {
      try {
        // Simple XLSX text extraction fallback (without library)
        showToast('Excel: använd CSV-export för bästa resultat');
      } catch { showToast('Kunde inte läsa Excel-fil'); }
    };
    reader.readAsArrayBuffer(file);

    // Try to load SheetJS dynamically
    if (!window.XLSX) {
      const script = document.createElement('script');
      script.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
      script.onload = () => {
        const reader2 = new FileReader();
        reader2.onload = e2 => {
          const wb = XLSX.read(new Uint8Array(e2.target.result), { type: 'array' });
          wb.SheetNames.forEach(sn => {
            const sheet = XLSX.utils.sheet_to_json(wb.Sheets[sn], { header: 1 });
            sheet.flat().forEach(v => { const s = String(v).trim(); if (s && s !== 'undefined') addUnique(s); });
          });
          showToast(`✓ ${file.name} importerad`);
          renderNames(); updatePredict();
        };
        reader2.readAsArrayBuffer(file);
      };
      document.head.appendChild(script);
    } else {
      const reader2 = new FileReader();
      reader2.onload = e2 => {
        const wb = XLSX.read(new Uint8Array(e2.target.result), { type: 'array' });
        wb.SheetNames.forEach(sn => {
          const sheet = XLSX.utils.sheet_to_json(wb.Sheets[sn], { header: 1 });
          sheet.flat().forEach(v => { const s = String(v).trim(); if (s && s !== 'undefined') addUnique(s); });
        });
        showToast(`✓ ${file.name} importerad`);
        renderNames(); updatePredict();
      };
      reader2.readAsArrayBuffer(file);
    }
  } else {
    showToast('Filformat stöds ej');
  }
}

function addUnique(name) {
  if (name && !names.includes(name)) names.push(name);
}

function togglePaste() {
  const area = document.getElementById('pasteArea');
  area.style.display = area.style.display === 'none' ? 'block' : 'none';
}

function importPaste() {
  const text = document.getElementById('pasteInput').value;
  text.split(/[\n,]+/).forEach(n => { const s = n.trim(); if (s) addUnique(s); });
  document.getElementById('pasteInput').value = '';
  togglePaste();
  renderNames(); updatePredict();
  showToast(`✓ Namn importerade`);
}

// --- Settings ---
function setMode(m) {
  mode = m;
  document.getElementById('modeAntal').classList.toggle('active', m === 'antal');
  document.getElementById('modeStorlek').classList.toggle('active', m === 'storlek');
  document.getElementById('numLabel').textContent = m === 'antal' ? 'ANTAL GRUPPER' : 'STORLEK PER GRUPP';
  updatePredict();
}

function changeNum(d) {
  numValue = Math.max(1, numValue + d);
  document.getElementById('numDisplay').textContent = numValue;
  updatePredict();
}

function updatePredict() {
  const p = document.getElementById('predictText');
  const n = names.length;
  if (!n) { p.textContent = ''; return; }
  if (mode === 'antal') {
    if (numValue > n) { p.innerHTML = `⚠ Fler grupper än deltagare`; return; }
    const base = Math.floor(n / numValue);
    const rem = n % numValue;
    if (rem === 0) p.innerHTML = `→ <strong>${numValue} grupper</strong> med <strong>${base} pers</strong> var`;
    else p.innerHTML = `→ <strong>${numValue} grupper</strong>: ${numValue - rem}×${base} och ${rem}×${base + 1} pers`;
  } else {
    if (numValue > n) { p.innerHTML = `⚠ Storlek större än antal deltagare`; return; }
    const g = Math.ceil(n / numValue);
    p.innerHTML = `→ <strong>${g} grupper</strong> med upp till <strong>${numValue} pers</strong>`;
  }
}

// --- Generate ---
function generateGroups() {
  if (!names.length) { showToast('Lägg till namn först!'); return; }

  const shuffled = [...names].sort(() => Math.random() - 0.5);
  let groups = [];

  if (mode === 'antal') {
    if (numValue > shuffled.length) { showToast('Fler grupper än deltagare!'); return; }
    const base = Math.floor(shuffled.length / numValue);
    const rem = shuffled.length % numValue;
    let idx = 0;
    for (let i = 0; i < numValue; i++) {
      const size = base + (i < rem ? 1 : 0);
      groups.push(shuffled.slice(idx, idx + size));
      idx += size;
    }
  } else {
    if (numValue > shuffled.length) { showToast('Storlek större än antal deltagare!'); return; }
    const numGroups = Math.ceil(shuffled.length / numValue);
    const keep = document.getElementById('keepRemainder').checked;
    if (keep) {
      // Distribute evenly like mode=antal but with numGroups
      const base = Math.floor(shuffled.length / numGroups);
      const rem = shuffled.length % numGroups;
      let idx = 0;
      for (let i = 0; i < numGroups; i++) {
        const size = base + (i < rem ? 1 : 0);
        groups.push(shuffled.slice(idx, idx + size));
        idx += size;
      }
    } else {
      for (let i = 0; i < shuffled.length; i += numValue) {
        groups.push(shuffled.slice(i, i + numValue));
      }
    }
  }

  renderGroups(groups);
}

function renderGroups(groups) {
  const area = document.getElementById('resultsArea');
  const grid = document.getElementById('groupsGrid');
  const badge = document.getElementById('resultsBadge');

  area.classList.add('visible');
  badge.textContent = `${groups.length} grupper`;
  grid.innerHTML = '';

  // Reset theme pool for fresh shuffle each generation
  const pool = THEMES[activeTheme]?.words || [];
  window._themePool = [...pool].sort(() => Math.random() - 0.5);

  const colors = ['#c8f03c', '#7b61ff', '#ff9d3c', '#3cf0e0', '#ff5a9d', '#3c9dff', '#ff3c3c', '#a3ff8a'];

  groups.forEach((members, i) => {
    const card = document.createElement('div');
    card.className = 'group-card';
    card.style.animationDelay = `${i * 0.04}s`;

    const color = colors[i % colors.length];
    const groupName = getGroupName(i, groups.length);
    card.innerHTML = `
      <div class="group-header" style="border-left: 3px solid ${color};">
        <span class="group-num">${groupName}</span>
        <span class="group-size">${members.length} pers</span>
      </div>
      <div class="group-members">
        ${members.map(m => `<div class="member"><div class="member-dot" style="background:${color};"></div>${m}</div>`).join('')}
      </div>
    `;
    grid.appendChild(card);
  });

  area.scrollIntoView({ behavior: 'smooth', block: 'start' });
  window._lastGroups = groups;
}

// --- Export ---
function copyResult() {
  if (!window._lastGroups) return;
  // Rebuild names using same pool
  const pool = THEMES[activeTheme]?.words || [];
  window._themePool = [...(window._lastThemePool || pool)];
  const text = window._lastGroups.map((g, i) => `${getGroupName(i, window._lastGroups.length)}:\n${g.join('\n')}`).join('\n\n');
  navigator.clipboard.writeText(text).then(() => showToast('✓ Kopierat till urklipp'));
}

function downloadResult() {
  if (!window._lastGroups) return;
  const text = window._lastGroups.map((g, i) => `${getGroupName(i, window._lastGroups.length)}:\n${g.join('\n')}`).join('\n\n');
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'grupper.txt';
  a.click();
  showToast('✓ Fil nedladdad');
}

function downloadPDF() {
  if (!window._lastGroups) return;
  document.getElementById('printDate').textContent = new Date().toLocaleDateString('sv-SE');
  window.print();
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// Init
buildThemePicker();
renderNames();
updatePredict();
</script>
</body>
</html>
